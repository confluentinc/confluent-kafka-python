# =============================================================================
# Local Kafka broker fixture for OAUTHBEARER integration tests.
#
# Uses Apache Kafka's "unsecured" OAUTHBEARER mode (KIP-255) so the broker
# accepts unsigned JWT tokens. The validator only checks claim shape and
# expiry, not any signature. NEVER use this config in production.
#
# Single-node KRaft cluster; storage goes to /tmp/kraft-oauth-test-logs and
# is wiped by stop_broker.sh.
# =============================================================================

# ---- KRaft single-node ------------------------------------------------------
process.roles=broker,controller
node.id=1
controller.quorum.voters=1@localhost:9093

# ---- Listeners --------------------------------------------------------------
# 9094 = client traffic (SASL_PLAINTEXT + OAUTHBEARER)
# 9093 = controller traffic (PLAINTEXT, internal only)
listeners=SASL_PLAINTEXT://:9094,CONTROLLER://:9093
advertised.listeners=SASL_PLAINTEXT://localhost:9094
listener.security.protocol.map=SASL_PLAINTEXT:SASL_PLAINTEXT,CONTROLLER:PLAINTEXT
controller.listener.names=CONTROLLER
inter.broker.listener.name=SASL_PLAINTEXT

# ---- SASL / OAUTHBEARER -----------------------------------------------------
sasl.enabled.mechanisms=OAUTHBEARER
sasl.mechanism.inter.broker.protocol=OAUTHBEARER

# Server-side: validate incoming tokens (signature-less; only checks
# {sub, iat, exp} claim shape). The unsecured handlers live in the
# internals.unsecured subpackage in Kafka 4.x.
listener.name.sasl_plaintext.oauthbearer.sasl.server.callback.handler.class=org.apache.kafka.common.security.oauthbearer.internals.unsecured.OAuthBearerUnsecuredValidatorCallbackHandler

# Broker-as-client: when the broker authenticates to itself (inter-broker
# traffic) it uses the unsecured login handler with sub="admin".
listener.name.sasl_plaintext.oauthbearer.sasl.jaas.config=org.apache.kafka.common.security.oauthbearer.OAuthBearerLoginModule required unsecuredLoginStringClaim_sub="admin";
listener.name.sasl_plaintext.oauthbearer.sasl.login.callback.handler.class=org.apache.kafka.common.security.oauthbearer.internals.unsecured.OAuthBearerUnsecuredLoginCallbackHandler

# Force re-authentication every 10s. Combined with a client token whose
# lifetime is < 10s, this exercises the refresh path inside a single test.
connections.max.reauth.ms=10000

# Share-group feature is enabled at format time via:
#   kafka-storage.sh format --feature share.version=1 ...
# (see start_broker.sh). The legacy
# group.coordinator.rebalance.protocols=share knob is deprecated in
# Kafka 4.x and removed in 5.0.
share.coordinator.state.topic.replication.factor=1
share.coordinator.state.topic.min.isr=1

# ---- Storage ---------------------------------------------------------------
log.dirs=/tmp/kraft-oauth-test-logs

# ---- Single-node defaults ---------------------------------------------------
num.partitions=1
default.replication.factor=1
offsets.topic.replication.factor=1
transaction.state.log.replication.factor=1
transaction.state.log.min.isr=1
auto.create.topics.enable=true
