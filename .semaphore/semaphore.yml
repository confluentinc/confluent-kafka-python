version: v1.0
name: build-test-release
agent:
  machine:
    type: s1-prod-ubuntu24-04-amd64-1
execution_time_limit:
  hours: 3
global_job_config:
  env_vars:
    - name: LIBRDKAFKA_VERSION
      value: v2.14.0
    - name: LIBRDKAFKA_BRANCH
      value: demo-current-london-2026
  prologue:
    commands:
      - checkout
      - mkdir artifacts
blocks:
  - name: "Wheels: OSX arm64 (branch) - Python 3.8-3.12"
    dependencies: []
    task:
      agent:
        machine:
          type: s1-macos-15-arm64-8
      env_vars:
        - name: OS_NAME
          value: osx
        - name: CIBW_ARCHS
          value: arm64
        - name: CIBW_ENVIRONMENT_MACOS
          value: MACOSX_DEPLOYMENT_TARGET=13
      jobs:
        - name: Build
          commands:
            - export ARCH=arm64
            - sem-version python 3.11
            - pip install uv
            - PIP_INSTALL_OPTIONS="--user" tools/wheels/build-wheels.sh "${LIBRDKAFKA_VERSION#v}" wheelhouse 2.16.2
            - tar -czf wheelhouse-macOS-${ARCH}.tgz wheelhouse
            - artifact push workflow wheelhouse-macOS-${ARCH}.tgz --destination artifacts/wheels-${OS_NAME}-${ARCH}.tgz/
  - name: "Wheels: OSX arm64 (branch) - Python 3.13-3.14"
    dependencies: []
    task:
      agent:
        machine:
          type: s1-macos-15-arm64-8
      env_vars:
        - name: OS_NAME
          value: osx
        - name: CIBW_ARCHS
          value: arm64
        - name: CIBW_SKIP
          value: cp38-* cp39-* cp310-* cp311-* cp312-*
        - name: CIBW_ENVIRONMENT_MACOS
          value: MACOSX_DEPLOYMENT_TARGET=13
      jobs:
        - name: Build
          commands:
            - export ARCH=arm64
            - sem-version python 3.13
            - pip install uv
            - PIP_INSTALL_OPTIONS="--user" tools/wheels/build-wheels.sh "${LIBRDKAFKA_VERSION#v}" wheelhouse
            - tar -czf wheelhouse-macOS-${ARCH}-py313-plus.tgz wheelhouse
            - artifact push workflow wheelhouse-macOS-${ARCH}-py313-plus.tgz --destination artifacts/wheels-${OS_NAME}-${ARCH}-py313-plus.tgz/
  - name: "Wheels: Linux x64 (branch)"
    dependencies: []
    task:
      agent:
        machine:
          type: s1-prod-ubuntu24-04-amd64-3
      env_vars:
        - name: OS_NAME
          value: linux
      jobs:
        - name: Build
          commands:
            - export ARCH=x64
            - sem-version python 3.11
            - pip install uv
            - ./tools/wheels/build-wheels.sh "${LIBRDKAFKA_VERSION#v}" wheelhouse
            - tar -czf wheelhouse-linux-${ARCH}.tgz wheelhouse
            - artifact push workflow wheelhouse-linux-${ARCH}.tgz --destination artifacts/wheels-${OS_NAME}-${ARCH}.tgz/
  - name: "Wheel Verification: OSX arm64 (branch)"
    dependencies:
      - "Wheels: OSX arm64 (branch) - Python 3.8-3.12"
      - "Wheels: OSX arm64 (branch) - Python 3.13-3.14"
    task:
      agent:
        machine:
          type: s1-macos-15-arm64-8
      env_vars:
        - name: OS_NAME
          value: osx
      jobs:
        - name: Verify
          commands:
            - checkout
            - sem-version python 3.11
            - export ARCH=arm64
            - pip install uv
            - uv pip install --system pytest
            - uv pip install --system -r requirements/requirements-tests-install.txt
            - artifact pull workflow artifacts
            - cd artifacts && ls *.tgz |xargs -n1 tar -xvf && cd ..
            - uv pip install --system --no-index --find-links artifacts/wheelhouse confluent-kafka
            - python -c "import confluent_kafka; print('version:', confluent_kafka.version())"
            - 'python -c "import confluent_kafka; confluent_kafka.Producer({''ssl.cipher.suites'':''DEFAULT''}); print(''OK: OpenSSL'')"'
            - 'python -c "import confluent_kafka; confluent_kafka.Producer({''compression.codec'':''gzip''}); print(''OK: gzip'')"'
            - 'python -c "import confluent_kafka; confluent_kafka.Producer({''compression.codec'':''lz4''}); print(''OK: lz4'')"'
            - 'python -c "import confluent_kafka; confluent_kafka.Producer({''compression.codec'':''snappy''}); print(''OK: snappy'')"'
            - 'python -c "import confluent_kafka; confluent_kafka.Producer({''compression.codec'':''zstd''}); print(''OK: zstd'')"'
            - pytest tests/test_error.py
  - name: "Wheel Verification: Linux x64 (branch)"
    dependencies:
      - "Wheels: Linux x64 (branch)"
    task:
      agent:
        machine:
          type: s1-prod-ubuntu24-04-amd64-3
      env_vars:
        - name: OS_NAME
          value: linux
      jobs:
        - name: Verify
          commands:
            - export ARCH=x64
            - sem-version python 3.9
            - artifact pull workflow artifacts
            - cd artifacts && ls *.tgz |xargs -n1 tar -xvf && cd ..
            - tools/test-wheels.sh artifacts/wheelhouse