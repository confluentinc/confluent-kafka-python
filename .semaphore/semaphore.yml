version: v1.0
name: build-test-release
agent:
  machine:
    type: s1-prod-ubuntu24-04-amd64-1
execution_time_limit:
  hours: 3
global_job_config:
  env_vars:
    - name: LIBRDKAFKA_VERSION
      value: v2.15.0-RC1
  prologue:
    commands:
      - checkout
      - mkdir artifacts
blocks:
  - name: "Wheels: OSX x64 - Python 3.8-3.12"
    run:
      when: "tag =~ '.*'"
    dependencies:
      - "Pre-release Validation"
    task:
      agent:
        machine:
          type: s1-macos-15-amd64-6
      env_vars:
        - name: OS_NAME
          value: osx
      jobs:
        - name: Build
          commands:
            - export ARCH=x64
            - sem-version python 3.11
            - pip install uv
            - PIP_INSTALL_OPTIONS="--user" tools/wheels/build-wheels.sh "${LIBRDKAFKA_VERSION#v}" wheelhouse 2.16.2
            - tar -czf wheelhouse-macOS-${ARCH}.tgz wheelhouse
            - artifact push workflow wheelhouse-macOS-${ARCH}.tgz --destination artifacts/wheels-${OS_NAME}-${ARCH}.tgz/
  - name: "Wheels: OSX x64 - Python 3.13-3.14"
    run:
      when: "tag =~ '.*'"
    dependencies:
      - "Pre-release Validation"
    task:
      agent:
        machine:
          type: s1-macos-15-amd64-6
      env_vars:
        - name: OS_NAME
          value: osx
        - name: CIBW_SKIP
          value: cp36-* cp37-* cp38-* cp39-* cp310-* cp311-* cp312-*
        - name: CIBW_ENVIRONMENT_MACOS
          value: MACOSX_DEPLOYMENT_TARGET=13
      jobs:
        - name: Build
          commands:
            - export ARCH=x64
            - sem-version python 3.13
            - pip install uv
            - PIP_INSTALL_OPTIONS="--user" tools/wheels/build-wheels.sh "${LIBRDKAFKA_VERSION#v}" wheelhouse
            - tar -czf wheelhouse-macOS-${ARCH}-py313-plus.tgz wheelhouse
            - artifact push workflow wheelhouse-macOS-${ARCH}-py313-plus.tgz --destination artifacts/wheels-${OS_NAME}-${ARCH}-py313-plus.tgz/
  - name: "Wheels: OSX arm64 - Python 3.8-3.12"
    run:
      when: "tag =~ '.*'"
    dependencies:
      - "Pre-release Validation"
    task:
      agent:
        machine:
          type: s1-macos-15-arm64-8
      env_vars:
        - name: OS_NAME
          value: osx
        - name: CIBW_ARCHS
          value: arm64
      jobs:
        - name: Build
          commands:
            - export ARCH=arm64
            - sem-version python 3.11
            - pip install uv
            - PIP_INSTALL_OPTIONS="--user" tools/wheels/build-wheels.sh "${LIBRDKAFKA_VERSION#v}" wheelhouse 2.16.2
            - tar -czf wheelhouse-macOS-${ARCH}.tgz wheelhouse
            - artifact push workflow wheelhouse-macOS-${ARCH}.tgz --destination artifacts/wheels-${OS_NAME}-${ARCH}.tgz/
  - name: "Wheels: OSX arm64 - Python 3.13-3.14"
    run:
      when: "tag =~ '.*'"
    dependencies:
      - "Pre-release Validation"
    task:
      agent:
        machine:
          type: s1-macos-15-arm64-8
      env_vars:
        - name: OS_NAME
          value: osx
        - name: CIBW_ARCHS
          value: arm64
        - name: CIBW_SKIP
          value: cp38-* cp39-* cp310-* cp311-* cp312-*
        - name: CIBW_ENVIRONMENT_MACOS
          value: MACOSX_DEPLOYMENT_TARGET=13
      jobs:
        - name: Build
          commands:
            - export ARCH=arm64
            - sem-version python 3.13
            - pip install uv
            - PIP_INSTALL_OPTIONS="--user" tools/wheels/build-wheels.sh "${LIBRDKAFKA_VERSION#v}" wheelhouse
            - tar -czf wheelhouse-macOS-${ARCH}-py313-plus.tgz wheelhouse
