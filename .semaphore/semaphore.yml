            - python -c "import confluent_kafka; print('version:', confluent_kafka.version())"
            - 'python -c "import confluent_kafka; confluent_kafka.Producer({''ssl.cipher.suites'':''DEFAULT''}); print(''OK: OpenSSL'')"'
